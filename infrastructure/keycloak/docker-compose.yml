services:
  kc-postgres:
    image: postgres:16
    container_name: keycloak_postgres_db
    environment:
      POSTGRES_DB: keycloakdb
      POSTGRES_USER: keycloakuser
      POSTGRES_PASSWORD: very+secret+db+pass+p2p++
    volumes:
      - kc_postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak_network
    restart: unless-stopped
  kc-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_server
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminkeycloakpass123

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://kc-postgres/keycloakdb
      KC_DB_USERNAME: keycloakuser
      KC_DB_PASSWORD: very+secret+db+pass+p2p++

      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9080
      KC_HEALTH_ENABLED: true

    command: start-dev
    ports:
      - "9080:8080"
    depends_on:
      - kc-postgres
    networks:
      - keycloak_network
    restart: unless-stopped
volumes:
  kc_postgres_data:
networks:
  keycloak_network:
    driver: bridge


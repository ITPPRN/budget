services:
  infisical_postgres:
    image: postgres:14-alpine
    container_name: infisical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: infisical_project
      POSTGRES_USER: infisical_project
      POSTGRES_PASSWORD: infisicalpass123

    volumes:
      - infisical_pgdata:/var/lib/postgresql/data
    networks:
      - infisical_net
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "infisical"]
      interval: 5s
      timeout: 5s
      retries: 5
  infisical_redis:
    image: redis:7-alpine
    container_name: infisical_redis
    restart: unless-stopped
    volumes:
      - infisical_redis:/data
    networks:
      - infisical_net
    ports:
      - "5436:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  infisical_server:
    image: infisical/infisical:latest
    container_name: infisical_server
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: 5f2e653aafcd04130c06d84038e32f25
      AUTH_SECRET: V1IaQPiNfhBThyH3IxR0Pk0HsipaQot+UmIbyXoObFo=

      DB_CONNECTION_URI: postgresql://infisical:infisical@infisical_postgres:5432/infisical

      REDIS_URL: redis://infisical_redis:6379

      SITE_URL: http://localhost:8121

    ports:
      - "8121:8080"

    depends_on:
      infisical_postgres:
        condition: service_healthy
      infisical_redis:
        condition: service_healthy

    networks:
      - infisical_net
volumes:
  infisical_pgdata:
  infisical_redis:
networks:
  infisical_net:
    driver: bridge


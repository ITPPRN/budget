server {
    server_tokens off;
    listen 80;

    # DNS resolver สำหรับ proxy_pass ไปยัง external domain
    # (ใช้ Docker DNS + public DNS fallback)
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=60s ipv6=off;

    # --- React SPA ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; form-action 'self';" always;

        try_files $uri $uri/ /index.html;
    }

   # --- Proxy ไป APISIX gateway (external HTTPS) ---
    location /budget-dash/v1/ {
        resolver 127.0.0.11 valid=30s;
        set $apisix_endpoint "https://apisix_loadbalancer:443";
        
        # 🚩 ใช้แค่ตัวแปร endpoint เพราะ $request_uri จะถูกส่งต่อไปโดยอัตโนมัติหรือจัดการผ่าน proxy_pass
        proxy_pass $apisix_endpoint;
       
        # TLS upstream
        proxy_ssl_server_name on;
        proxy_ssl_name        auth-central.ach.co.th;
        proxy_ssl_verify      off;
        proxy_ssl_protocols   TLSv1.2 TLSv1.3;

        # Headers
        proxy_set_header Host              auth-central.ach.co.th;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  yourdomain.com:8443;

        # 🚩 1. เพิ่ม Buffer เพื่อรองรับไฟล์ JSON/Token ใหญ่ๆ (แก้ 502 แบบสุ่ม)
        proxy_buffer_size          256k;
        proxy_buffers              8 256k;
        proxy_busy_buffers_size    512k;

        # 🚩 2. เพิ่ม Retry หาก DNS หรือ Network ใน Docker กระตุก (แก้ Host not found)
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_cookie_path   / /;
        proxy_cookie_domain auth-central.ach.co.th $host;

        proxy_redirect      off;

        # 🚩 3. เพิ่ม Timeout ให้สัมพันธ์กับ Backend ที่ทำงานนาน 2 วิ+
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}

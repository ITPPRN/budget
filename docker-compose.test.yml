services:
  go_backend:
    build:
      context: ./p2p-back-end
      dockerfile: Dockerfile
    container_name: bud_backend
    restart: unless-stopped
    env_file:
      - ./p2p-back-end/.env
    ports:
      - "18000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # จำกัดขนาดไฟล์ Log (ตัดไฟล์ใหม่เมื่อถึง 200KB เก็บย้อนหลัง 3 ไฟล์)
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "3"
    # จำกัดทรัพยากร CPU และ RAM
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - apisix

  frontend:
    build:
      context: ./p2p-front-end
      dockerfile: Dockerfile
    container_name: p2p_frontend
    restart: unless-stopped
    # ports:
    #   - "13001:80"
    depends_on:
      - go_backend
    
    environment:
      # ใส่ชื่อ Service ของ APISIX Load Balancer ที่เราคุยกันไว้ 
      # (ถ้า Load Balancer ของคุณชื่อ apisix-lb หรือ apisix_https_cluster ก็ใส่ชื่อนั้น)
      - APISIX_ENDPOINT=https://apisix_loadbalancer:443

    # จำกัดขนาดไฟล์ Log
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "3"
    # จำกัดทรัพยากร (Nginx เสิร์ฟ React กินสเปคน้อยมาก)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - apisix

networks:
  # ✅ ประกาศว่าเราจะใช้ network 'apisix' ที่ถูกสร้างไว้แล้วข้างนอก
  apisix:
    external: true